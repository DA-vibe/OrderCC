<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>CYBER CORPS — Restricted Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--white:#f4f6fb;--dim:#9aa2b8;--faint:#5b6275;--cyan:#39e6ff;--blue:#4f7cff;--purple:#9d6bff;
  --grad:linear-gradient(90deg,var(--cyan),var(--blue) 52%,var(--purple))}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);color:var(--white);display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',system-ui,sans-serif;overflow:hidden;padding:20px}
.aur{position:fixed;inset:0;pointer-events:none}
.aur i{position:absolute;border-radius:50%}
.aur .a1{width:70vmax;height:70vmax;top:-30vmax;left:-22vmax;background:radial-gradient(circle,rgba(79,124,255,.16),transparent 62%);animation:d1 30s ease-in-out infinite alternate}
.aur .a2{width:60vmax;height:60vmax;bottom:-26vmax;right:-20vmax;background:radial-gradient(circle,rgba(157,107,255,.14),transparent 60%);animation:d2 38s ease-in-out infinite alternate}
@keyframes d1{to{transform:translate(8vmax,6vmax)}}
@keyframes d2{to{transform:translate(-7vmax,-8vmax)}}
@media (prefers-reduced-motion:reduce){.aur i{animation:none}}
.gate{position:relative;z-index:2;width:min(440px,100%);text-align:center;padding:52px 40px;border-radius:26px;
  background:linear-gradient(160deg,rgba(255,255,255,.055),rgba(255,255,255,.018));
  border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(16px);
  box-shadow:0 40px 90px -40px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.06)}
.gate.shake{animation:shake .45s ease}
@keyframes shake{20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(3px)}}
.mark{margin:0 auto 20px;display:block;animation:pulse 2.6s ease-in-out infinite}
@keyframes pulse{50%{opacity:.55}}
h1{font-size:19px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;margin-bottom:8px}
.sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.3em;color:var(--faint);text-transform:uppercase;margin-bottom:34px}
form{display:flex;gap:10px}
input{flex:1;min-width:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.14);border-radius:999px;
  padding:15px 22px;color:var(--white);font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.12em;
  outline:none;transition:border-color .25s,box-shadow .25s}
input::placeholder{color:var(--faint);letter-spacing:.2em;font-size:11px}
input:focus{border-color:rgba(57,230,255,.55);box-shadow:0 0 26px -6px rgba(57,230,255,.35)}
button{border:none;border-radius:999px;padding:15px 26px;background:var(--grad);color:#04060c;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12px;letter-spacing:.16em;text-transform:uppercase;
  box-shadow:0 10px 34px -10px rgba(79,124,255,.65);transition:box-shadow .3s,transform .2s}
button:hover{box-shadow:0 14px 44px -8px rgba(157,107,255,.75);transform:translateY(-1px)}
button:disabled{opacity:.55;cursor:wait;transform:none}
.msg{margin-top:26px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.24em;
  color:var(--faint);text-transform:uppercase;min-height:14px;transition:color .25s}
.msg.err{color:#ff5f7a}
.msg.ok{color:var(--cyan)}
</style>
</head>
<body>

    <circle cx="20" cy="31" r="2" fill="#39e6ff"/><circle cx="9" cy="20" r="2" fill="#39e6ff"/>
    <path d="M20 15.6 L21.5 18.5 L24.4 20 L21.5 21.5 L20 24.4 L18.5 21.5 L15.6 20 L18.5 18.5 Z" fill="#f4f6fb"/>

  var gate = document.getElementById("gate"), msg = document.getElementById("msg");
  var pw = document.getElementById("pw"), go = document.getElementById("go");
  function b2u(b64){
    var s = atob(b64), u = new Uint8Array(s.length);
    for (var i = 0; i < s.length; i++) u[i] = s.charCodeAt(i);
    return u;
  }
  function u2b(u){
    var s = "";
    for (var i = 0; i < u.length; i++) s += String.fromCharCode(u[i]);
    return btoa(s);

    var enc = new TextEncoder();
